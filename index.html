<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>UFO PACHINKO — 宇宙烈伝</title>
        <style>
            :root {
                --bg: #3b3b40;
                --board: #0a0a0c;
                --pin: #e8c520;
                --neon-purple: #b14ce8;
                --neon-pink: #ff4fa3;
                --neon-cyan: #37c8f0;
                --metal: #cfd2d8;
                --win: #ff3b3b;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                background: var(--bg);
                overflow: hidden;
                font-family:
                    "Hiragino Kaku Gothic ProN", "Yu Gothic", monospace;
                -webkit-user-select: none;
                user-select: none;
                touch-action: none;
            }
            #wrap {
                display: flex;
                height: 100%;
                align-items: center;
                justify-content: center;
                gap: 14px;
                padding: 10px;
            }
            #boardBox {
                position: relative;
                height: 100%;
                aspect-ratio: 1000/1080;
                max-width: calc(100vw - 190px);
            }
            canvas {
                width: 100%;
                height: 100%;
                display: block;
                border-radius: 18px;
                box-shadow:
                    0 0 0 6px #1c1c20,
                    0 0 60px rgba(177, 76, 232, 0.25),
                    0 14px 50px rgba(0, 0, 0, 0.7);
            }
            /* ---- control panel ---- */
            #panel {
                width: 160px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                color: #ddd;
            }
            .card {
                background: #1a1a1f;
                border: 1px solid #2c2c34;
                border-radius: 12px;
                padding: 10px;
            }
            .lbl {
                font-size: 10px;
                letter-spacing: 0.18em;
                color: #8a8a96;
                margin-bottom: 6px;
            }
            .num {
                font-size: 24px;
                font-weight: 800;
                color: #ffd93b;
                font-variant-numeric: tabular-nums;
                text-shadow: 0 0 12px rgba(255, 217, 59, 0.5);
            }
            .num.small {
                font-size: 18px;
                color: var(--neon-cyan);
                text-shadow: 0 0 10px rgba(55, 200, 240, 0.5);
            }
            #powerWrap {
                height: 220px;
                display: flex;
                gap: 10px;
                align-items: stretch;
            }
            #powerTrack {
                flex: 1;
                background: #0d0d10;
                border-radius: 8px;
                position: relative;
                cursor: pointer;
                border: 1px solid #2c2c34;
                overflow: hidden;
            }
            #powerFill {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 55%;
                background: linear-gradient(to top, #37c8f0, #b14ce8, #ff4fa3);
                transition: height 0.05s;
            }
            #powerKnob {
                position: absolute;
                left: -4px;
                right: -4px;
                height: 14px;
                bottom: calc(55% - 7px);
                background: var(--metal);
                border-radius: 4px;
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
            }
            #fireBtn {
                width: 100%;
                padding: 14px 0;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
                font-weight: 900;
                letter-spacing: 0.1em;
                color: #1a0505;
                background: linear-gradient(180deg, #ffd93b, #e8a020);
                box-shadow:
                    0 4px 0 #9c6a10,
                    0 0 24px rgba(255, 217, 59, 0.35);
            }
            #fireBtn:active {
                transform: translateY(3px);
                box-shadow: 0 1px 0 #9c6a10;
            }
            #autoBtn {
                width: 100%;
                padding: 9px 0;
                border: 1px solid #3a3a44;
                border-radius: 10px;
                cursor: pointer;
                background: #101014;
                color: #9a9aa6;
                font-weight: 700;
                font-size: 12px;
                letter-spacing: 0.12em;
            }
            #autoBtn.on {
                background: #2a1240;
                border-color: var(--neon-purple);
                color: #e8c0ff;
                box-shadow: 0 0 16px rgba(177, 76, 232, 0.45);
            }
            #msg {
                min-height: 34px;
                font-size: 11px;
                line-height: 1.5;
                color: #b9b9c6;
            }
            #oddsList {
                display: grid;
                grid-template-columns: 1fr;
                gap: 3px;
                font-size: 11px;
                line-height: 1.25;
                color: #ddd;
                font-variant-numeric: tabular-nums;
            }
            #oddsList .top {
                color: #ffd93b;
                font-weight: 900;
                text-shadow: 0 0 10px rgba(255, 217, 59, 0.45);
            }
            #feverBadge {
                display: none;
                text-align: center;
                padding: 6px;
                border-radius: 10px;
                font-weight: 900;
                color: #fff;
                background: linear-gradient(90deg, #ff3b3b, #ff8a00, #ff3b3b);
                animation: fv 0.5s infinite alternate;
                letter-spacing: 0.15em;
            }
            @keyframes fv {
                from {
                    filter: brightness(0.85);
                }
                to {
                    filter: brightness(1.3);
                }
            }
            @media (max-width: 680px) {
                html,
                body {
                    height: auto;
                    min-height: 100%;
                    overflow: auto;
                    touch-action: manipulation;
                }
                #wrap {
                    flex-direction: column;
                    align-items: stretch;
                    justify-content: flex-start;
                    gap: 8px;
                    height: auto;
                    min-height: 100dvh;
                    padding: 8px;
                }
                #boardBox {
                    max-width: 100%;
                    width: 100%;
                    height: clamp(480px, 74svh, 760px);
                    flex: 0 0 auto;
                    min-height: 0;
                    aspect-ratio: auto;
                }
                #panel {
                    width: 100%;
                    flex-direction: row;
                    flex-wrap: wrap;
                    gap: 8px;
                }
                .card {
                    flex: 1;
                    min-width: 100px;
                    padding: 8px;
                }
                #powerWrap {
                    height: 72px;
                }
                #fireBtn {
                    padding: 12px 0;
                }
                #msg {
                    flex-basis: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div id="boardBox"><canvas id="cv"></canvas></div>
            <div id="panel">
                <div class="card">
                    <div class="lbl">持ち玉</div>
                    <div class="num" id="ballCount">250</div>
                </div>
                <div class="card">
                    <div class="lbl">大当り回数</div>
                    <div class="num small" id="winCount">0</div>
                </div>
                <div class="card">
                    <div class="lbl">倍率</div>
                    <div id="oddsList"></div>
                </div>
                <div class="card">
                    <div class="lbl">発射強度</div>
                    <div id="powerWrap">
                        <div id="powerTrack">
                            <div id="powerFill"></div>
                            <div id="powerKnob"></div>
                        </div>
                    </div>
                </div>
                <button id="fireBtn">発 射</button>
                <button id="autoBtn" class="on">AUTO 連射 ON</button>
                <div id="feverBadge">★ FEVER ★</div>
                <div class="card">
                    <div id="msg">
                        左下から打ち出し→外周レールで上昇→釘の海へ。中央スタートチャッカーでスロット始動だ。
                    </div>
                </div>
            </div>
        </div>

        <script>
            "use strict";
            /* ============================================================
   UFO PACHINKO 宇宙烈伝 — physics pachinko simulator
   ============================================================ */
            const W = 1000,
                H = 1080;
            const CX = 500,
                CY = 520,
                R = 478; // circular board
            const BALL_R = 8,
                BALL_DIAMETER = BALL_R * 2;
            const SLOT_RECT = {
                x: 316,
                y: 225,
                w: 368,
                h: 300,
            };
            const SLOT_HIT_RECT = {
                x: SLOT_RECT.x + 18,
                y: SLOT_RECT.y + 54,
                w: SLOT_RECT.w - 36,
                h: SLOT_RECT.h - 102,
            };
            const SLOT_SAFE_PADDING = BALL_DIAMETER * 1.5;
            const SLOT_SAFE_ZONE = {
                x: SLOT_HIT_RECT.x - SLOT_SAFE_PADDING,
                y: SLOT_HIT_RECT.y - SLOT_SAFE_PADDING,
                w: SLOT_HIT_RECT.w + SLOT_SAFE_PADDING * 2,
                h: SLOT_HIT_RECT.h + SLOT_SAFE_PADDING * 2,
            };
            const NO_PIN_ZONE = SLOT_SAFE_ZONE;
            const cv = document.getElementById("cv");
            const ctx = cv.getContext("2d");
            let DPR = 1;
            function resize() {
                DPR = Math.min(window.devicePixelRatio || 1, 2);
                cv.width = W * DPR;
                cv.height = H * DPR;
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            }
            resize();
            addEventListener("resize", resize);

            /* ---------- audio ---------- */
            const SFX_DEFS = {
                ui_click: { file: "ui_click.wav", volume: 0.25, cooldown: 45 },
                ball_launch: { file: "ball_launch.wav", volume: 0.35, cooldown: 55 },
                pin_hit_soft: {
                    file: [
                        "pin_hit_soft.wav",
                        "pin_hit_soft_01.wav",
                        "pin_hit_soft_02.wav",
                        "pin_hit_soft_03.wav",
                    ],
                    volume: 0.12,
                    cooldown: 38,
                    pitch: [0.9, 1.15],
                    category: "pin",
                },
                pin_hit_hard: {
                    file: [
                        "pin_hit_hard.wav",
                        "pin_hit_hard_01.wav",
                        "pin_hit_hard_02.wav",
                    ],
                    volume: 0.18,
                    cooldown: 55,
                    pitch: [0.92, 1.12],
                    category: "pin",
                },
                ui_cancel: { file: "ui_cancel.wav", volume: 0.22, cooldown: 55 },
                wall_hit: { file: "wall_hit.wav", volume: 0.14, cooldown: 80 },
                tulip_open: { file: "tulip_open.wav", volume: 0.45, cooldown: 80 },
                tulip_close: { file: "tulip_close.wav", volume: 0.35, cooldown: 80 },
                tentacle_emerge: {
                    file: "tentacle_emerge.wav",
                    volume: 0.45,
                    cooldown: 180,
                },
                tentacle_wiggle_loop: {
                    file: "tentacle_wiggle_loop.wav",
                    volume: 0.08,
                    loop: true,
                },
                tentacle_grab: {
                    file: "tentacle_grab.wav",
                    volume: 0.55,
                    cooldown: 120,
                },
                ball_deflect: {
                    file: "ball_deflect.wav",
                    volume: 0.45,
                    cooldown: 90,
                    pitch: [0.9, 1.1],
                },
                start_in: { file: "start_in.wav", volume: 0.5, cooldown: 80 },
                slot_spin_start: {
                    file: "slot_spin_start.wav",
                    volume: 0.4,
                    cooldown: 250,
                },
                slot_reel_stop: {
                    file: [
                        "slot_reel_stop.wav",
                        "slot_reel_stop_01.wav",
                        "slot_reel_stop_02.wav",
                        "slot_reel_stop_03.wav",
                    ],
                    volume: 0.35,
                    cooldown: 70,
                    pitch: [0.92, 1.12],
                },
                slot_near_miss: {
                    file: "slot_near_miss.wav",
                    volume: 0.38,
                    cooldown: 250,
                },
                jackpot_small: {
                    file: "jackpot_small.wav",
                    volume: 0.65,
                    cooldown: 500,
                },
                jackpot_big: {
                    file: "jackpot_big.wav",
                    volume: 0.8,
                    cooldown: 900,
                },
                attack_ready: {
                    file: "attack_ready.wav",
                    volume: 0.5,
                    cooldown: 300,
                },
                attack_hit: { file: "attack_hit.wav", volume: 0.6, cooldown: 90 },
                miss_drop: { file: "miss_drop.wav", volume: 0.22, cooldown: 140 },
            };

            class AudioManager {
                constructor(defs) {
                    this.defs = defs;
                    this.ctx = null;
                    this.buffers = new Map();
                    this.loading = new Map();
                    this.loops = new Map();
                    this.lastPlay = new Map();
                    this.pinDuckUntil = 0;
                    this.master = 0.9;
                }
                ensureContext() {
                    if (this.ctx) return this.ctx;
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    if (!Ctx) return null;
                    this.ctx = new Ctx();
                    return this.ctx;
                }
                unlock() {
                    const ctx2 = this.ensureContext();
                    if (!ctx2) return Promise.resolve();
                    const resumed =
                        ctx2.state === "suspended"
                            ? ctx2.resume().catch(() => {})
                            : Promise.resolve();
                    try {
                        const gain = ctx2.createGain();
                        gain.gain.value = 0.0001;
                        gain.connect(ctx2.destination);
                        const osc = ctx2.createOscillator();
                        osc.frequency.value = 1;
                        osc.connect(gain);
                        osc.start();
                        osc.stop(ctx2.currentTime + 0.01);
                    } catch (e) {}
                    this.preload();
                    return resumed;
                }
                preload() {
                    Object.entries(this.defs).forEach(([id, def]) =>
                        this.filesFor(def).forEach((file) => this.load(id, file)),
                    );
                }
                filesFor(def) {
                    return Array.isArray(def.file) ? def.file : [def.file];
                }
                pickFile(def) {
                    const files = this.filesFor(def);
                    return files[Math.floor(Math.random() * files.length)];
                }
                bufferKey(id, file) {
                    return id + ":" + file;
                }
                load(id, preferredFile = null) {
                    const def = this.defs[id];
                    const ctx2 = this.ensureContext();
                    if (!def || !ctx2) return Promise.resolve(null);
                    const file = preferredFile || this.filesFor(def)[0];
                    const key = this.bufferKey(id, file);
                    if (this.buffers.has(key) || this.loading.has(key)) {
                        return this.loading.get(key);
                    }
                    const task = fetch("assets/sfx/" + file)
                        .then((res) => (res.ok ? res.arrayBuffer() : null))
                        .then((buf) => (buf ? ctx2.decodeAudioData(buf) : null))
                        .then((audioBuffer) => {
                            if (audioBuffer) this.buffers.set(key, audioBuffer);
                            return audioBuffer;
                        })
                        .catch(() => null);
                    this.loading.set(key, task);
                    return task;
                }
                pitchFor(def, options) {
                    if (options.pitch) return options.pitch;
                    if (!def.pitch) return 1;
                    const [min, max] = def.pitch;
                    return min + Math.random() * (max - min);
                }
                play(id, options = {}) {
                    const def = this.defs[id];
                    const ctx2 = this.ensureContext();
                    if (!def || !ctx2) return;
                    if (ctx2.state === "suspended") {
                        if (options.retryOnUnlock !== false) {
                            this.unlock().then(() => {
                                if (this.ctx && this.ctx.state === "running") {
                                    this.play(id, {
                                        ...options,
                                        cooldown: 0,
                                        retryOnUnlock: false,
                                    });
                                }
                            });
                        }
                        return;
                    }
                    const nowMs = performance.now();
                    const cooldown = options.cooldown ?? def.cooldown ?? 0;
                    const last = this.lastPlay.get(id) || -Infinity;
                    if (nowMs - last < cooldown) return;
                    this.lastPlay.set(id, nowMs);
                    if (id === "jackpot_big") this.duckPins(3200);
                    const baseVolume = options.volume ?? def.volume ?? 0.3;
                    const duck = def.category === "pin" && nowMs < this.pinDuckUntil ? 0.35 : 1;
                    const volume = baseVolume * this.master * duck;
                    const pitch = this.pitchFor(def, options);
                    const file = this.pickFile(def);
                    const key = this.bufferKey(id, file);
                    const buffer = this.buffers.get(key);
                    if (buffer) {
                        this.playBuffer(buffer, volume, pitch, options);
                    } else {
                        this.load(id, file);
                        this.playFallback(id, volume, pitch);
                    }
                }
                playBuffer(buffer, volume, pitch, options = {}) {
                    const ctx2 = this.ctx;
                    const src = ctx2.createBufferSource();
                    const gain = ctx2.createGain();
                    src.buffer = buffer;
                    src.playbackRate.value = pitch;
                    gain.gain.setValueAtTime(volume, ctx2.currentTime);
                    gain.gain.exponentialRampToValueAtTime(
                        0.0001,
                        ctx2.currentTime + (options.fadeOut ?? buffer.duration),
                    );
                    src.connect(gain).connect(ctx2.destination);
                    src.start();
                }
                playFallback(id, volume, pitch = 1) {
                    const ctx2 = this.ctx;
                    const shape = {
                        ui_click: [880, 0.06, "sine"],
                        ui_cancel: [420, 0.08, "triangle"],
                        ball_launch: [320, 0.12, "triangle"],
                        pin_hit_soft: [2200, 0.04, "sine"],
                        pin_hit_hard: [1500, 0.06, "square"],
                        wall_hit: [420, 0.05, "triangle"],
                        tulip_open: [760, 0.16, "triangle"],
                        tulip_close: [280, 0.08, "square"],
                        tentacle_emerge: [120, 0.2, "sawtooth"],
                        tentacle_grab: [90, 0.12, "sawtooth"],
                        ball_deflect: [840, 0.1, "triangle"],
                        start_in: [990, 0.16, "sine"],
                        slot_spin_start: [260, 0.24, "sawtooth"],
                        slot_reel_stop: [540, 0.06, "square"],
                        slot_near_miss: [620, 0.18, "triangle"],
                        jackpot_small: [1320, 0.28, "triangle"],
                        jackpot_big: [880, 0.45, "sawtooth"],
                        attack_ready: [160, 0.28, "sawtooth"],
                        attack_hit: [180, 0.18, "square"],
                        miss_drop: [180, 0.08, "triangle"],
                    }[id] || [440, 0.08, "sine"];
                    const osc = ctx2.createOscillator();
                    const gain = ctx2.createGain();
                    osc.type = shape[2];
                    osc.frequency.value = shape[0] * pitch;
                    gain.gain.setValueAtTime(volume, ctx2.currentTime);
                    gain.gain.exponentialRampToValueAtTime(
                        0.0001,
                        ctx2.currentTime + shape[1],
                    );
                    osc.connect(gain).connect(ctx2.destination);
                    osc.start();
                    osc.stop(ctx2.currentTime + shape[1]);
                }
                loop(id, options = {}) {
                    if (this.loops.has(id)) return;
                    const def = this.defs[id];
                    const ctx2 = this.ensureContext();
                    if (!def || !ctx2 || ctx2.state === "suspended") return;
                    const startLoop = (buffer) => {
                        if (!buffer || this.loops.has(id)) return;
                        const src = ctx2.createBufferSource();
                        const gain = ctx2.createGain();
                        src.buffer = buffer;
                        src.loop = true;
                        src.playbackRate.value = this.pitchFor(def, options);
                        gain.gain.setValueAtTime(0.0001, ctx2.currentTime);
                        gain.gain.linearRampToValueAtTime(
                            (options.volume ?? def.volume ?? 0.08) * this.master,
                            ctx2.currentTime + 0.12,
                        );
                        src.connect(gain).connect(ctx2.destination);
                        src.start();
                        this.loops.set(id, { src, gain });
                    };
                    const file = this.filesFor(def)[0];
                    const buffer = this.buffers.get(this.bufferKey(id, file));
                    if (buffer) startLoop(buffer);
                    else this.load(id, file).then(startLoop);
                }
                stop(id) {
                    const loop = this.loops.get(id);
                    if (!loop || !this.ctx) return;
                    const t = this.ctx.currentTime;
                    loop.gain.gain.cancelScheduledValues(t);
                    loop.gain.gain.setValueAtTime(loop.gain.gain.value, t);
                    loop.gain.gain.linearRampToValueAtTime(0.0001, t + 0.12);
                    setTimeout(() => {
                        try {
                            loop.src.stop();
                        } catch (e) {}
                    }, 150);
                    this.loops.delete(id);
                }
                duckPins(ms) {
                    this.pinDuckUntil = Math.max(this.pinDuckUntil, performance.now() + ms);
                }
            }

            const audioManager = new AudioManager(SFX_DEFS);
            window.SFX_DEFS = SFX_DEFS;
            window.audioManager = audioManager;
            function playSound(soundName, options) {
                audioManager.play(soundName, options);
            }
            function loopSound(soundName, options) {
                audioManager.loop(soundName, options);
            }
            function stopSound(soundName) {
                audioManager.stop(soundName);
            }
            addEventListener(
                "click",
                () => {
                    audioManager.unlock();
                },
                { once: true, capture: true },
            );
            addEventListener(
                "keydown",
                () => {
                    audioManager.unlock();
                },
                { once: true },
            );

            /* ---------- board construction ---------- */
            const pins = []; // {x,y,r,hot}
            const windmills = []; // {x,y,r,ang,spd,dir}
            const pockets = []; // {x,y,w,type,label,open}
            const removedPins = [];
            function inRectWithRadius(x, y, r, rect) {
                return (
                    x + r > rect.x &&
                    x - r < rect.x + rect.w &&
                    y + r > rect.y &&
                    y - r < rect.y + rect.h
                );
            }
            function pin(x, y, r = 5) {
                if (inRectWithRadius(x, y, r, NO_PIN_ZONE)) {
                    removedPins.push({ x, y, r });
                    return;
                }
                pins.push({ x, y, r, hot: 0 });
            }
            function arcPins(cx, cy, rad, a0, a1, n, r = 5) {
                for (let i = 0; i < n; i++) {
                    const a = a0 + ((a1 - a0) * i) / (n - 1);
                    pin(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad, r);
                }
            }
            function linePins(x0, y0, x1, y1, n, r = 5) {
                for (let i = 0; i < n; i++) {
                    const t = n === 1 ? 0 : i / (n - 1);
                    pin(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t, r);
                }
            }
            function staggerPins(points) {
                for (const [x, y] of points) pin(x, y);
            }
            const D2R = Math.PI / 180;
            const SIDE_RAIL_BUMPERS = [
                { side: -1, a0: 160 * D2R, a1: 200 * D2R, radius: R - 72 },
                { side: 1, a0: -20 * D2R, a1: 20 * D2R, radius: R - 72 },
            ];
            const flippers = [
                {
                    side: 1,
                    x: 310,
                    y: 862,
                    len: 126,
                    rest: 8 * D2R,
                    active: -33 * D2R,
                    ang: 8 * D2R,
                    lastAng: 8 * D2R,
                    hot: 0,
                },
                {
                    side: -1,
                    x: 690,
                    y: 862,
                    len: 126,
                    rest: 172 * D2R,
                    active: 213 * D2R,
                    ang: 172 * D2R,
                    lastAng: 172 * D2R,
                    hot: 0,
                },
            ];

            /* --- top splitter pins: staggered, with the enlarged slot kept clear --- */
            staggerPins([
                [248, 184],
                [318, 158],
                [386, 145],
                [455, 154],
                [522, 140],
                [594, 152],
                [666, 161],
                [736, 186],

                [214, 226],
                [260, 246],
                [742, 239],
                [786, 264],

                [202, 292],

            /* ---------- physics ---------- */
            const G = 0.165,
                SUB = 8;
            function step() {
                frameCount++;
                maybeSpawnTentacleGuard();
                updateFlippers();
                let pinSoundPlayed = false;
                for (const b of balls) {
                    if (b.dead) continue;
                    b.age++;
                    for (let s = 0; s < SUB; s++) {
                        b.vy += G / SUB;
                        b.x += b.vx / SUB;
                        b.y += b.vy / SUB;

                        /* circular outer wall */
                        const dx = b.x - CX,
                            dy = b.y - CY,
                            d = Math.hypot(dx, dy);
                        if (d > R - b.r) {
                            const nx = dx / d,
                                ny = dy / d;
                            b.x = CX + nx * (R - b.r);
                            b.y = CY + ny * (R - b.r);
                            const vn = b.vx * nx + b.vy * ny;
                            if (vn > 0) {
                                b.vx -= (1 + 0.28) * vn * nx; // restitution .28
                                b.vy -= (1 + 0.28) * vn * ny;
                                b.vx *= 0.992;
                                b.vy *= 0.992; // rail friction (keeps the climb alive)
                                playSound("wall_hit");
                            }
                        }
                        /* slot panel housing = solid rounded block, top center */
                        collideRect(
                            b,
                            SLOT_HIT_RECT.x,
                            SLOT_HIT_RECT.y,
                            SLOT_HIT_RECT.w,
                            SLOT_HIT_RECT.h,
                        );
                        collideSideRailBumpers(b);

                        /* pins */
                        for (const p of pins) {
                            const ddx = b.x - p.x,
                                ddy = b.y - p.y,
                                rr = b.r + p.r;
                            const dd2 = ddx * ddx + ddy * ddy;
                            if (dd2 < rr * rr && dd2 > 0.001) {
                                const dd = Math.sqrt(dd2),
                                    nx = ddx / dd,
                                    ny = ddy / dd;
                                b.x = p.x + nx * rr;
                                b.y = p.y + ny * rr;
                                const vn = b.vx * nx + b.vy * ny;
                                if (vn < 0) {
                                    const impact = Math.abs(vn);
                                    const e = 0.52 + Math.random() * 0.1;
                                    b.vx -= (1 + e) * vn * nx;
                                    b.vy -= (1 + e) * vn * ny;
                                    b.vx += (Math.random() - 0.5) * 0.35; // 釘のクセ
                                    p.hot = 1;
                                    if (!pinSoundPlayed && impact > 0.75) {
                                        playSound(
                                            impact > 3.2 ? "pin_hit_hard" : "pin_hit_soft",
                                        );
                                        pinSoundPlayed = true;
                                    }
                                }
                            }
                        }
                        /* windmills: circle hit + rotational kick */
                        for (const wm of windmills) {
                            const ddx = b.x - wm.x,
                                ddy = b.y - wm.y,
                                rr = b.r + wm.r - 6;
                            const dd = Math.hypot(ddx, ddy);
                            if (dd < rr && dd > 0.001) {
                                const nx = ddx / dd,
                                    ny = ddy / dd;
                                b.x = wm.x + nx * rr;
                                b.y = wm.y + ny * rr;
                                const vn = b.vx * nx + b.vy * ny;
                                if (vn < 0) {
                                    b.vx -= (1 + 0.5) * vn * nx;
                                    b.vy -= (1 + 0.5) * vn * ny;
                                }
                                // tangential kick from spin
                                b.vx += -ny * wm.spd * 26;
                                b.vy += nx * wm.spd * 26;
                                wm.spd += wm.dir * 0.02;
                                playSound("wall_hit", { volume: 0.1 });
                            }
                        }
                        collideActiveTentacles(b);
                        collideFlippers(b);
                        /* pockets */
                        for (const pk of pockets) {
                            if (!pk.open) continue;
                            if (
                                Math.abs(b.x - pk.x) < pk.w * 0.62 &&
                                b.y > pk.y - 6 &&
                                b.y < pk.y + 18 &&
                                b.vy > 0
                            ) {
                                b.dead = true;
                                pk.glow = 1;
                                onCatch(pk);
                                break;
                            }
                        }
                        if (b.dead) break;
                        /* out hole — drained at the bottom of the bowl */
                        if (b.y > CY + R * 0.91) {
                            b.dead = true;
                            playSound("miss_drop");
                        }
                    }
                    b.trail.push(b.x, b.y);
                    if (b.trail.length > 16) b.trail.splice(0, 2);
                    const moved = Math.hypot(b.x - b.lastX, b.y - b.lastY);
                    b.still = moved < 0.8 ? b.still + 1 : 0;
                    b.lastX = b.x;
                    b.lastY = b.y;

                        playSound("miss_drop", { volume: 0.12 });
                    }

                for (let i = balls.length - 1; i >= 0; i--)
                    if (balls[i].dead) balls.splice(i, 1);
                for (const p of pins) p.hot *= 0.9;
                for (const pk of pockets) pk.glow *= 0.93;
                for (const wm of windmills) {
                    wm.ang += wm.spd;
                    wm.spd += (0.07 * wm.dir - wm.spd) * 0.02;
                }
                updateTentacleFX();
            }
            function flipperTip(fl) {
                return {
                    x: fl.x + Math.cos(fl.ang) * fl.len,
                    y: fl.y + Math.sin(fl.ang) * fl.len,
                };
            }
            function updateFlippers() {
                for (const fl of flippers) {
                    fl.lastAng = fl.ang;
                    const reactive = balls.some(
                        (b) =>
                            !b.dead &&
                            b.y > 735 &&
                            b.y < 910 &&
                            b.vy > -4 &&
                            (fl.side > 0
                                ? b.x > 230 && b.x < 500
                                : b.x > 500 && b.x < 770),
                    );
                    const periodic = (frameCount + (fl.side > 0 ? 0 : 18)) % 118 < 12;
                    const target = reactive || periodic ? fl.active : fl.rest;
                    const speed = reactive ? 0.5 : 0.26;
                    fl.ang += (target - fl.ang) * speed;
                    fl.hot = Math.max(0, fl.hot * 0.88 + (reactive ? 0.18 : 0));
                }
            }
            function collideFlippers(b) {
                for (const fl of flippers) {
                    const tip = flipperTip(fl);
                    const p = closestPointOnSegment(b.x, b.y, fl.x, fl.y, tip.x, tip.y);
                    let dx = b.x - p.x,
                        dy = b.y - p.y,
                        d = Math.hypot(dx, dy);
                    const hitR = b.r + 11;
                    if (d >= hitR) continue;
                    if (d < 0.001) {
                        const sx = tip.x - fl.x,
                            sy = tip.y - fl.y,
                            sd = Math.hypot(sx, sy) || 1;
                        dx = -sy / sd;
                        dy = sx / sd;
                        d = 1;
                    }
                    let nx = dx / d,
                        ny = dy / d;
                    if (ny > 0.25) {
                        nx = -nx;
                        ny = -ny;
                    }
                    b.x = p.x + nx * hitR;
                    b.y = p.y + ny * hitR;
                    const vn = b.vx * nx + b.vy * ny;
                    if (vn < 0) {
                        b.vx -= (1 + 0.82) * vn * nx;
                        b.vy -= (1 + 0.82) * vn * ny;
                    }
                    const swing = Math.abs(fl.ang - fl.lastAng) * 120;
                    b.vx += fl.side * (2.8 + swing * 0.45);
                    b.vy = Math.min(b.vy, -10.5 - swing * 0.9);
                    b.still = 0;
                    fl.hot = 1;
                    playSound("attack_hit", { volume: 0.24, cooldown: 120 });
                    return true;
                }
                return false;
            }
            function collideRect(b, x, y, w, h) {
                let cx2 = Math.max(x, Math.min(b.x, x + w)),
                    cy2 = Math.max(y, Math.min(b.y, y + h));
                let dx = b.x - cx2,
                    dy = b.y - cy2,
                    d = Math.hypot(dx, dy);
                if (d < 0.001 && b.x > x && b.x < x + w && b.y > y && b.y < y + h) {
                    const left = b.x - x,
                        right = x + w - b.x,
                        top = b.y - y,
                        bottom = y + h - b.y;
                    const m = Math.min(left, right, top, bottom);
                    if (m === left) {
                        dx = -1;
                        dy = 0;
                        cx2 = x;
                        cy2 = b.y;
                    } else if (m === right) {
                        dx = 1;
                        dy = 0;
                        cx2 = x + w;
                        cy2 = b.y;
                    } else if (m === top) {
                        dx = 0;
                        dy = -1;
                        cx2 = b.x;
                        cy2 = y;
                    } else {
                        dx = 0;
                        dy = 1;
                        cx2 = b.x;
                        cy2 = y + h;
                    }
                    d = 1;
                }
                if (d < b.r) {
                    const nx = dx / d,
                        ny = dy / d;
                    b.x = cx2 + nx * b.r;
                    b.y = cy2 + ny * b.r;
                    const vn = b.vx * nx + b.vy * ny;
                    if (vn < 0) {
                        b.vx -= (1 + 0.4) * vn * nx;
                        b.vy -= (1 + 0.4) * vn * ny;
                    }
                    if (ny < -0.5) {
                        b.vx += b.x < x + w / 2 ? -0.12 : 0.12;
                    }
                }
            }
            function angleBetween(a, a0, a1) {
                const tau = Math.PI * 2;
                const n = (v) => ((v % tau) + tau) % tau;
                a = n(a);
                a0 = n(a0);
                a1 = n(a1);
                return a0 <= a1 ? a >= a0 && a <= a1 : a >= a0 || a <= a1;
            }
            function collideSideRailBumpers(b) {
                for (const rail of SIDE_RAIL_BUMPERS) {
                    const dx = b.x - CX,
                        dy = b.y - CY,
                        dist = Math.hypot(dx, dy);
                    if (dist < 0.001) continue;
                    const angle = Math.atan2(dy, dx);
                    if (!angleBetween(angle, rail.a0, rail.a1)) continue;
                    const gap = dist - rail.radius;
                    if (Math.abs(gap) > b.r + 4) continue;
                    const nx = dx / dist,
                        ny = dy / dist;
                    b.x = CX + nx * (rail.radius - b.r - 4);
                    b.y = CY + ny * (rail.radius - b.r - 4);
                    const vn = b.vx * nx + b.vy * ny;
                    if (vn > 0) {
                        b.vx -= (1 + 1.25) * vn * nx;
                        b.vy -= (1 + 1.25) * vn * ny;
                        b.vx += -ny * rail.side * 1.2;
                        b.vy += nx * rail.side * 1.2;
                        playSound("wall_hit");
                    }
                }
            }

            /* ---------- pocket events ---------- */
            function popup(x, y, t, c) {

            function spawnTentacleTulip(pk, force = false) {
                if (!force && Math.random() > 0.45) return false;
                const count = 2 + Math.floor(Math.random() * 3);
                const lean = pk.x < CX ? 0.16 : -0.16;
                tentacleFX.push({
                    x: pk.x + (Math.random() - 0.5) * 12,

                    age: 0,
                    life: 120 + Math.floor(Math.random() * 50),
                    guardPocket: pk,
                    tentacles: Array.from({ length: count }, (_, i) => ({
                        base:
                            -Math.PI / 2 +
                            (count === 1 ? 0 : (i / (count - 1) - 0.5) * 1.25) +
                            lean +
                            (Math.random() - 0.5) * 0.38,
                        joints: 3 + Math.floor(Math.random() * 3),
                        seed: Math.random() * 1000,
                        hitCooldown: 0,
                    })),
                });
                popup(pk.x, pk.y - 72, "邪魔触手!", "#ffffff");
                playSound("tentacle_emerge");

                return true;
            }
            function hasActiveTentacleGuard(pk) {
                return tentacleFX.some(
                    (fx) => fx.guardPocket === pk && fx.age < fx.life - 24,
                );
            }
            function ballNearTulipMouth(pk) {
                return balls.some(
                    (b) =>
                        !b.dead &&
                        Math.abs(b.x - pk.x) < pk.w + 52 &&
                        b.y > pk.y - 118 &&
                        b.y < pk.y + 18 &&
                        b.vy > -1.5,
                );
            }
            function maybeSpawnTentacleGuard() {
                if (balls.length === 0) return;
                tentacleSpawnTimer--;
                if (tentacleSpawnTimer > 0) return;
                tentacleSpawnTimer = 28 + Math.floor(Math.random() * 70);
                if (tentacleFX.length > 5) return;
                const tulips = pockets.filter(
                    (pk) => pk.type === "tulip" && pk.open && !hasActiveTentacleGuard(pk),
                );
                if (!tulips.length) return;
                const threatened = tulips.filter(ballNearTulipMouth);
                const pool = threatened.length ? threatened : tulips;
                const spawnChance = threatened.length ? 0.72 : 0.18;
                if (Math.random() > spawnChance) return;
                const pk = pool[Math.floor(Math.random() * pool.length)];
                spawnTentacleTulip(pk, true);
            }
            function rotateBallVelocity(b) {
                const speed = Math.hypot(b.vx, b.vy) || 2;
                const current = Math.atan2(b.vy, b.vx);
                const sign = Math.random() < 0.5 ? -1 : 1;
                const add = sign * (30 + Math.random() * 60) * D2R;
                b.vx = Math.cos(current + add) * speed * 1.08;
                b.vy = Math.sin(current + add) * speed * 1.08;
                b.still = 0;
            }
            function tentaclePoints(effect, tentacle) {
                const points = [{ x: effect.x, y: effect.y }];
                const t = effect.age / 60;
                const grow = Math.min(1, effect.age / 28);
                const nearest = balls
                    .filter((b) => !b.dead)
                    .map((b) => ({
                        ball: b,
                        d: Math.hypot(b.x - effect.x, b.y - effect.y),
                    }))
                    .sort((a, b) => a.d - b.d)[0];
                const track = nearest ? Math.max(0, 1 - nearest.d / 80) : 0;
                let p = points[0],
                    angle = tentacle.base;
                for (let i = 0; i < tentacle.joints; i++) {
                    const delayGrow = Math.max(0, Math.min(1, grow * tentacle.joints - i * 0.35));
                    const wave =
                        Math.sin(t * 5 + tentacle.seed + i * 1.4) * 0.34 +
                        Math.sin(t * 9 + tentacle.seed * 0.31 + i * 2.2) * 0.12;
                    if (nearest && track > 0) {
                        const toBall = Math.atan2(nearest.ball.y - p.y, nearest.ball.x - p.x);
                        angle += (toBall - angle) * track * (0.18 + i * 0.08);
                    }
                    angle += wave;
                    const len = (34 - i * 4) * delayGrow;
                    p = { x: p.x + Math.cos(angle) * len, y: p.y + Math.sin(angle) * len };
                    points.push(p);
                }
                return points;
            }
            function closestPointOnSegment(px, py, ax, ay, bx, by) {
                const vx = bx - ax,
                    vy = by - ay;
                const len2 = vx * vx + vy * vy || 1;
                const t = Math.max(0, Math.min(1, ((px - ax) * vx + (py - ay) * vy) / len2));
                return { x: ax + vx * t, y: ay + vy * t, t };
            }
            function collideTentacleBall(b, points) {
                for (let i = 0; i < points.length - 1; i++) {
                    const a = points[i],
                        c = points[i + 1],
                        progress = i / Math.max(1, points.length - 2),
                        tubeR = 6.5 - progress * 4.2;
                    const p = closestPointOnSegment(b.x, b.y, a.x, a.y, c.x, c.y);
                    let dx = b.x - p.x,
                        dy = b.y - p.y,
                        d = Math.hypot(dx, dy);
                    const hitR = b.r + tubeR;
                    if (d >= hitR) continue;
                    if (d < 0.001) {
                        const sx = c.x - a.x,
                            sy = c.y - a.y;
                        d = Math.hypot(sx, sy) || 1;
                        dx = -sy / d;
                        dy = sx / d;
                        d = 1;
                    }
                    const nx = dx / d,
                        ny = dy / d;
                    b.x = p.x + nx * hitR;
                    b.y = p.y + ny * hitR;
                    const vn = b.vx * nx + b.vy * ny;
                    if (vn < 0) {
                        b.vx -= (1 + 1.05) * vn * nx;
                        b.vy -= (1 + 1.05) * vn * ny;
                    }
                    const tangentKick = (Math.random() - 0.5) * 2.8;
                    b.vx += nx * 1.8 - ny * tangentKick;
                    b.vy += ny * 1.8 + nx * tangentKick;
                    b.still = 0;
                    return true;
                }
                return false;
            }
            function collideActiveTentacles(b) {
                for (const fx of tentacleFX) {
                    if (fx.age < 8 || fx.age > fx.life - 12) continue;
                    for (const tentacle of fx.tentacles) {
                        const points = tentaclePoints(fx, tentacle);
                        if (!collideTentacleBall(b, points)) continue;
                        if (tentacle.hitCooldown <= 0) {
                            tentacle.hitCooldown = 18;
                            rotateBallVelocity(b);
                            playSound("tentacle_grab");
                            playSound("ball_deflect", { cooldown: 110 });
                            popup(b.x, b.y - 24, "入れない!", "#ffffff");
                        }
                        return true;
                    }
                }
                return false;
            }
            function updateTentacleFX() {
                for (let i = tentacleFX.length - 1; i >= 0; i--) {
                    const fx = tentacleFX[i];
                    fx.age++;
                    for (const tentacle of fx.tentacles) {
                        tentacle.hitCooldown = Math.max(0, tentacle.hitCooldown - 1);
                    }
                    if (fx.age > fx.life) tentacleFX.splice(i, 1);
                }
                if (tentacleFX.length === 0) stopSound("tentacle_wiggle_loop");
            }
            function onCatch(pk) {
                if (pk.type === "start") {
                    stock += 3;
                    popup(pk.x, pk.y - 30, "+3", "#ffd93b");
                    playSound("start_in");

                            reserve++;
                            say("保留 +1 (" + reserve + "/4)");
                        }
                    } else startSlot();
                } else if (pk.type === "tulip") {
                    pk.catchCount++;
                    stock += 5;
                    popup(pk.x, pk.y - 30, "+5", "#37c8f0");
                    playSound("tulip_open");
                    setTimeout(() => playSound("tulip_close", { volume: 0.2 }), 180);
                } else if (pk.type === "attacker") {

                    popup(pk.x, pk.y - 34, "+15", "#ff4fa3");
                    playSound("attack_hit");
                    if (feverCatch >= 10)
                        endFever("10カウント達成!ラウンド終了!");

            /* ---------- slot ---------- */
            function startSlot() {
                slot.spin = true;
                slot.t = 0;
                slot.result = null;
                slot.winLines = [];
                slot.lastMult = 0;
                slot.stoppedReels = [false, false, false];
                slot.vel = Array.from(
                    { length: SLOT_CELLS },
                    (_, i) => 0.42 + i * 0.025 + Math.random() * 0.12,
                );
                slot.stopT = Array.from(
                    { length: SLOT_CELLS },
                    (_, i) =>
                        70 +
                        i * 18 +
                        (i === SLOT_CELLS - 1 && Math.random() < 0.25
                            ? 70
                            : 0),
                );
                const win = Math.random() < 1 / 4;
                slot.result = win ? makeWinningGrid() : makeLosingGrid();
                say("スロット回転中…!");
                playSound("slot_spin_start");
            }
            function randomSymbol() {
                return Math.floor(Math.random() * SYMS.length);
            }
            function randomGrid() {
                return Array.from({ length: SLOT_CELLS }, randomSymbol);
            }
            function makeWinningGrid() {
                const grid = randomGrid();
                const line = SLOT_LINES[Math.floor(Math.random() * SLOT_LINES.length)];
                const sym = randomSymbol();
                for (const idx of line) grid[idx] = sym;
                return grid;
            }
            function makeLosingGrid() {
                for (let i = 0; i < 80; i++) {
                    const grid = randomGrid();
                    if (findWinLines(grid).length === 0) return grid;
                }
                const grid = randomGrid();
                for (const line of SLOT_LINES) {
                    if (
                        grid[line[0]] === grid[line[1]] &&
                        grid[line[1]] === grid[line[2]]
                    ) {
                        grid[line[2]] = (grid[line[2]] + 1) % SYMS.length;
                    }
                }
                return grid;
            }
            function findWinLines(grid) {
                return SLOT_LINES.filter(
                    (line) =>
                        grid[line[0]] === grid[line[1]] &&
                        grid[line[1]] === grid[line[2]],
                );
            }
            function bestMultiplier(lines, grid) {
                return lines.reduce(
                    (best, line) => Math.max(best, MULTS[grid[line[0]]]),
                    0,
                );
            }
            function hasNearMiss(grid) {
                return SLOT_LINES.some((line) => {
                    const values = line.map((idx) => grid[idx]);
                    return (
                        values[0] === values[1] ||
                        values[1] === values[2] ||
                        values[0] === values[2]
                    );
                });
            }
            function updateSlot() {
                if (!slot.spin) {
                    slot.flash *= 0.96;
                    if (slot.winPulse > 0) slot.winPulse--;
                    return;
                }
                slot.t++;
                for (let i = 0; i < SLOT_CELLS; i++) {
                    if (slot.t < slot.stopT[i]) slot.reel[i] += slot.vel[i];
                    else {
                        // snap to target symbol
                        const target = slot.result[i];
                        const cur = slot.reel[i] % SYMS.length;
                        let diff = (target - cur + SYMS.length) % SYMS.length;
                        if (diff > 0.06) slot.reel[i] += Math.min(diff, 0.12);
                        else {
                            slot.reel[i] = target;
                            const col = i % 3;
                            const columnDone = [col, col + 3, col + 6].every(
                                (idx) => slot.t >= slot.stopT[idx],
                            );
                            if (columnDone && !slot.stoppedReels[col]) {
                                slot.stoppedReels[col] = true;
                                playSound("slot_reel_stop", {
                                    pitch: 0.94 + col * 0.08 + Math.random() * 0.04,
                                });
                            }
                        }
                    }
                }
                if (slot.t > slot.stopT[SLOT_CELLS - 1] + 40) {
                    slot.spin = false;
                    slot.winLines = findWinLines(slot.result);
                    slot.lastMult = bestMultiplier(slot.winLines, slot.result);
                    if (slot.winLines.length > 0) {
                        bigWin();
                    } else {
                        say("ハズレ…次いくナリ!");
                        playSound(hasNearMiss(slot.result) ? "slot_near_miss" : "miss_drop");
                        if (reserve > 0) {
                            reserve--;
                            setTimeout(startSlot, 500);
                        }
                    }
                }
            }
            function bigWin() {
                wins++;
                fever = 60 * 18;
                feverCatch = 0;
                slot.flash = 1;
                slot.winPulse = 180;
                stock += slot.lastMult;
                for (const pk of pockets)
                    if (pk.type === "attacker") pk.open = true;
                const bestLine = slot.winLines.reduce((best, line) =>
                    MULTS[slot.result[line[0]]] > MULTS[slot.result[best[0]]]
                        ? line
                        : best,
                );
                const bestSymbol = slot.result[bestLine[0]];
                symbolHitCounts[bestSymbol]++;
                say(
                    "🎉大当り!!!「" +
                        SYMS[bestSymbol] +
                        "」揃い x" +
                        slot.lastMult +
                        "! +" +
                        slot.lastMult +
                        "玉!アタッカー全開!",
                );
                playSound(slot.lastMult >= 50 ? "jackpot_big" : "jackpot_small");
                playSound("attack_ready");
                for (let i = 0; i < 80; i++)
                    FX.push({
                        x: CX + (Math.random() - 0.5) * 300,
                        y: 250 + Math.random() * 200,
                        t: ["✦", "★", "BANG!", "WIN"][i % 4],
                        c: ["#ffd93b", "#ff4fa3", "#37c8f0", "#ffffff"][i % 4],
                        life: 70 + Math.random() * 80,
                    });
                ui();
            }
            function endFever(t) {
                fever = 0;
                for (const pk of pockets)
                    if (pk.type === "attacker") pk.open = false;
                say(t + (reserve > 0 ? " 保留消化いくナリ!" : ""));

            }

            /* ---------- render ---------- */

                for (const fx of tentacleFX) drawTentacleFX(fx);

                /* balls */
                for (const b of balls) {
                    // trail
                    for (let i = 0; i < b.trail.length; i += 2) {
                        const a = i / b.trail.length;
                        ctx.beginPath();
                        ctx.arc(
                            b.trail[i],

                        );

                    ctx.fillStyle = bg;
                    ctx.fill();
                }

                /* FX popups */

                    ctx.fillStyle = f.c;

                if (debugGeometry) drawDebugGeometry();

                /* fever overlay */

                    const a = 0.06 + 0.05 * Math.sin(performance.now() / 90);
                    ctx.beginPath();
                    ctx.arc(CX, CY, R, 0, 7);
                    ctx.fillStyle = `rgba(255,60,60,${a})`;

                        "FEVER  残り " +

            function sideRail(side) {

                        Math.cos(a + 6 * D2R) * (R - 60),

            function drawFlipper(fl) {

            function drawPocket(pk) {
                ctx.save();
                ctx.translate(pk.x, pk.y);

            function drawTentacleFX(fx) {
                const fadeIn = Math.min(1, fx.age / 18);
                const fadeOut = Math.min(1, (fx.life - fx.age) / 30);
                const alpha = Math.max(0, Math.min(fadeIn, fadeOut));
                if (alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                for (const tentacle of fx.tentacles) {
                    const points = tentaclePoints(fx, tentacle);
                    ctx.shadowColor = "rgba(255,255,255,0.55)";
                    ctx.shadowBlur = 10;
                    for (let i = 0; i < points.length - 1; i++) {
                        const a = points[i],
                            b = points[i + 1],
                            t = i / Math.max(1, points.length - 2);
                        const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
                        g.addColorStop(0, "#ffffff");
                        g.addColorStop(1, "#d9f6ff");
                        ctx.strokeStyle = g;
                        ctx.lineWidth = 12 - t * 9;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                    const tip = points[points.length - 1];
                    ctx.beginPath();
                    ctx.arc(tip.x, tip.y, 4, 0, 7);
                    ctx.fillStyle = "#ffffff";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(tip.x - 1, tip.y - 1, 1.7, 0, 7);
                    ctx.fillStyle = "#9ee7ff";
                    ctx.fill();
                }
                ctx.restore();
            }
            function rr(x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.arcTo(x + w, y, x + w, y + h, r);
                ctx.arcTo(x + w, y + h, x, y + h, r);
                ctx.arcTo(x, y + h, x, y, r);
                ctx.arcTo(x, y, x + w, y, r);
                ctx.closePath();
            }
            function drawSlotPanel() {
                const x = SLOT_RECT.x,
                    y = SLOT_RECT.y,
                    w = SLOT_RECT.w,
                    h = SLOT_RECT.h;
                ctx.fillStyle = "#000";
                rr(x + 18, y + 54, w - 36, h - 102, 14);
                ctx.fill();
                // 3x3 reels
                ctx.save();
                rr(x + 22, y + 58, w - 44, h - 110, 12);
                ctx.clip();
                const gridX = x + 32,
                    gridY = y + 68,
                    gap = 8,
                    gridW = w - 64,
                    gridH = h - 130,
                    cellW = (gridW - gap * 2) / 3,
                    cellH = (gridH - gap * 2) / 3,
                    winningCells = new Set(slot.winLines.flat());
                for (let i = 0; i < SLOT_CELLS; i++) {
                    const col = i % 3,
                        row = Math.floor(i / 3),
                        rx = gridX + col * (cellW + gap),
                        ry = gridY + row * (cellH + gap);
                    ctx.fillStyle = "#0d0d12";
                    ctx.fillRect(rx, ry, cellW, cellH);
                    const pos = slot.reel[i];
                    for (let k = -1; k <= 1; k++) {
                        const idx =
                            (((Math.floor(pos) + k) % SYMS.length) +
                                SYMS.length) %
                            SYMS.length;
                        const frac = pos - Math.floor(pos);
                        const cy = ry + cellH / 2;
                        const sy = cy + (k - frac) * (cellH + 4);
                        const isStoppedWin =
                            !slot.spin && winningCells.has(i) && k === 0 && slot.winPulse > 0;
                        const pulse =
                            isStoppedWin
                                ? 1 + 0.3 * (0.5 + 0.5 * Math.sin((180 - slot.winPulse) * 0.24))
                                : 1;
                        ctx.font = Math.round(48 * pulse) + "px serif";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.globalAlpha = Math.max(
                            0,
                            1 - Math.abs(sy - cy) / (cellH * 0.9),
                        );
                        if (isStoppedWin) {
                            ctx.save();
                            ctx.shadowColor = "#ffd93b";
                            ctx.shadowBlur = 16 + (pulse - 1) * 48;
                            ctx.fillText(SYMS[idx], rx + cellW / 2, sy);
                            ctx.restore();
                        } else {
                            ctx.fillText(SYMS[idx], rx + cellW / 2, sy);
                        }
                        ctx.globalAlpha = 1;
                    }
                    ctx.strokeStyle = "#2c2c36";
                    ctx.lineWidth = 1;
                    ctx.strokeRect(rx, ry, cellW, cellH);
                }
                ctx.restore();
                ctx.textBaseline = "alphabetic";
                ctx.textAlign = "center";
                ctx.font = "bold 17px monospace";
                ctx.fillStyle = "#ffd93b";
                ctx.fillText(
                    slot.lastMult > 0 ? "WIN x" + slot.lastMult : "MAX 🦑 x100",
                    x + w / 2,
                    y + h - 20,
                );
            }

            /* ---------- input ---------- */
            const track = $("powerTrack"),
                fill = $("powerFill"),
                knob = $("powerKnob");
            function setPower(v) {
                power = Math.max(0.05, Math.min(1, v));
                fill.style.height = power * 100 + "%";
                knob.style.bottom = "calc(" + power * 100 + "% - 7px)";
            }
            setPower(0.8);
            let dragging = false;
            function trackEv(e) {
                const r = track.getBoundingClientRect();
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                setPower(1 - (y - r.top) / r.height);
            }
            track.addEventListener("pointerdown", (e) => {
                dragging = true;
                playSound("ui_click");
                trackEv(e);
            });
            addEventListener("pointermove", (e) => {
                if (dragging) trackEv(e);
            });
            addEventListener("pointerup", () => (dragging = false));
            $("fireBtn").addEventListener("click", () => {
                audioManager.unlock();
                playSound("ui_click");
                launch();
            });
            $("autoBtn").addEventListener("click", () => {
                audioManager.unlock();
                autoFire = !autoFire;
                playSound(autoFire ? "ui_click" : "ui_cancel");
                $("autoBtn").classList.toggle("on", autoFire);
                $("autoBtn").textContent =
                    "AUTO 連射 " + (autoFire ? "ON" : "OFF");
            });
            addEventListener("keydown", (e) => {
                if (e.code === "Space") {
                    e.preventDefault();
                    audioManager.unlock();
                    launch();
                }
                if (e.code === "ArrowUp") setPower(power + 0.03);
                if (e.code === "ArrowDown") setPower(power - 0.03);
                if (e.code === "KeyD") {
                    debugGeometry = !debugGeometry;
                    say(
                        "デバッグ表示 " +
                            (debugGeometry ? "ON" : "OFF") +
                            " / slotRect・noPinZone確認",
                    );
                }
            });

            /* ---------- main loop ---------- */
            function loop() {
                step();
                updateSlot();
                if (fever > 0) {
                    fever--;
                    if (fever === 0) endFever("FEVER終了!");
                }
                if (autoFire) {
                    autoTimer++;
                    if (autoTimer >= 36) {
                        autoTimer = 0;
                        launch();
                    }
                } // 100発/分
                draw();
                requestAnimationFrame(loop);
            }
            ui();
            loop();
        </script>
    </body>
</html>
